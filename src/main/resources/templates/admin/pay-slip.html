<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Slip</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      position: relative;
      background: white;
    }

    /* Watermark inside section */
    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      font-size: 80px;
      font-weight: bold;
      color: rgba(0, 0, 0, 0.03); /* Lighter and more transparent */
      z-index: 1; /* Keeps it behind content */
      white-space: nowrap;
      pointer-events: none;
    }

    section {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid black;
      text-align: left;
    }

    @media print {
      .watermark {
        top: 45%;
      }
      
      button { display: none; }
    }
  </style>
</head>

<body>
<div style="text-align: start; margin-top: 20px;">
    <button id="generatePDF" class="btn btn-primary" 
        th:data-employee-name="${employee.employeeName}"
        th:data-month="${month}"
        th:data-year="${year}">
        <i class="fa-solid fa-file-pdf"></i> Download
    </button>
</div>

<section>
  <!-- Watermark added inside section -->
  <div class="watermark">AONE RECOVERY</div>

  <div style="text-align: center; font-weight: bold; font-size: 30px;">AONE RECOVERY</div>
  <div style="text-align: center; margin-top: 10px;" th:text="|SALARY SLIP FOR THE MONTH OF ${month} ${year}|"></div>

  <div style="display: flex; justify-content: space-between; margin-top: 20px;">
    <div>
      <p>Name: <span th:text="${employee.employeeName}"></span></p>
      <p>Bank Name: <span th:text="${employee.bankName}"></span></p>
      <p>Bank Account No: <span th:text="${employee.accountNumber}"></span></p>
    </div>
    <div>
      <p>Designation:<span th:text="${employee.designation}"></span></p>
      <p th:text="|Salary Month: ${month}|"></p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th colspan="3">Earnings</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="payroll: ${payrolls}">
        <td colspan="3" th:text="${payroll.allowanceName}"></td>
        <td th:text="|₹ ${payroll.allowanceAmount}|"></td>
      </tr>
    </tbody>
  </table>

  <table>
    <thead>
      <tr>
        <th colspan="3">Deductions</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td colspan="3" th:text="| ${deduction?.deductionName ?: '-'}|"></td>
        <td th:text="|₹ ${deduction?.deductionAmount ?: '0'}|"></td>
      </tr>
    </tbody>
  </table>

  <table>
    <tbody>
      <tr>
        <td>TOTAL (Earnings)</td>
        <td th:text="|₹ ${summary.totalAllowance}|"></td>
        <td>TOTAL (Deductions)</td>
        <td th:text="|₹ ${summary.totalDeduction}|"></td>
      </tr>
      <tr>
        <td>NET PAY (Earnings-Deductions)</td>
        <td th:text="|₹ ${summary.netSalary}|"></td>
        <td>NET PAY ROUNDED</td>
        <td th:text="|₹ ${#numbers.formatDecimal(summary.netSalary, 0, 0)}|"></td>
      </tr>
    </tbody>
  </table>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
document.getElementById("generatePDF").addEventListener("click", function () {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const salarySlip = document.querySelector("section");

    html2canvas(salarySlip, { scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const imgWidth = 210;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        pdf.addImage(imgData, "PNG", 0, 0, imgWidth, imgHeight);
        
        const employeeName = this.getAttribute("data-employee-name");
        const month = this.getAttribute("data-month");
        const year = this.getAttribute("data-year");
        pdf.save(`Salary_Slip_${employeeName}_${month}_${year}.pdf`);
    });
});
</script>
</body>
</html>
